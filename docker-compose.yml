services:
  postgres:
    image: timescale/timescaledb:2.25.1-pg15
    container_name: jacksparrow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - jacksparrow-network

  redis:
    image: redis:7.2-alpine
    container_name: jacksparrow-redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - jacksparrow-network

  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: jacksparrow-qdrant
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-}
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333'"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - jacksparrow-network

  agent:
    container_name: jacksparrow-agent
    image: ${AGENT_IMAGE:-jacksparrow-agent:latest}
    build:
      context: .
      dockerfile: agent/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      DELTA_EXCHANGE_API_KEY: ${DELTA_EXCHANGE_API_KEY}
      DELTA_EXCHANGE_API_SECRET: ${DELTA_EXCHANGE_API_SECRET}
      DELTA_EXCHANGE_BASE_URL: ${DELTA_EXCHANGE_BASE_URL:-https://api.india.delta.exchange}
      # In-container path; override with AGENT_MODEL_DIR in root .env if bundle folder name changes
      MODEL_DIR: ${AGENT_MODEL_DIR:-/app/agent/model_storage/jacksparrow_v5_BTCUSD_2026-03-21}
      REQUIRE_MODELS_ON_STARTUP: ${REQUIRE_MODELS_ON_STARTUP:-true}
      MODEL_PATH: ${MODEL_PATH:-}
      AGENT_START_MODE: ${AGENT_START_MODE:-MONITORING}
      AGENT_SYMBOL: ${AGENT_SYMBOL:-BTCUSD}
      AGENT_INTERVAL: ${AGENT_INTERVAL:-15m}
      AGENT_WS_PORT: ${AGENT_WS_PORT:-8003}
      FEATURE_SERVER_PORT: 8002
      LOG_LEVEL: ${AGENT_LOG_LEVEL:-INFO}
      LOGS_ROOT: /logs
      BACKEND_WS_URL: ws://backend:8000/ws/agent
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
    volumes:
      - ./agent/model_storage:/app/agent/model_storage
      - ./logs/agent:/logs
      - ./logs/paper_trades:/logs/paper_trades
    ports:
      - "${FEATURE_SERVER_PORT:-8002}:8002"
      - "${AGENT_WS_PORT:-8003}:8003"
    healthcheck:
      test: ["CMD", "python", "-m", "agent.healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '2'
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - jacksparrow-network

  backend:
    container_name: jacksparrow-backend
    image: ${BACKEND_IMAGE:-jacksparrow-backend:latest}
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      agent:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      BACKEND_RELOAD: "false"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      FEATURE_SERVER_URL: http://agent:8002
      # Always use container listen port (right side of ports mapping); do not use
      # AGENT_WS_PORT here — that variable is for the host publish port only.
      AGENT_WS_URL: ws://agent:8003
      USE_AGENT_WEBSOCKET: ${USE_AGENT_WEBSOCKET:-true}
      DELTA_EXCHANGE_API_KEY: ${DELTA_EXCHANGE_API_KEY}
      DELTA_EXCHANGE_API_SECRET: ${DELTA_EXCHANGE_API_SECRET}
      DELTA_EXCHANGE_BASE_URL: ${DELTA_EXCHANGE_BASE_URL:-https://api.india.delta.exchange}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      API_KEY: ${API_KEY}
      BACKEND_PORT: ${BACKEND_PORT:-8000}
      BACKEND_HOST: 0.0.0.0
      LOG_LEVEL: ${BACKEND_LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS}
      CORS_INTERNAL_ORIGINS: ${CORS_INTERNAL_ORIGINS:-http://frontend:3000}
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./logs/backend:/logs
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os,urllib.request; urllib.request.urlopen('http://127.0.0.1:%s/api/v1/health' % os.environ.get('BACKEND_PORT','8000'), timeout=5)",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - jacksparrow-network

  frontend:
    container_name: jacksparrow-frontend
    image: ${FRONTEND_IMAGE:-jacksparrow-frontend:latest}
    build:
      context: frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000/ws}
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000/ws}
      NEXT_PUBLIC_BACKEND_PROXY_BASE: ${NEXT_PUBLIC_BACKEND_PROXY_BASE:-/api/backend}
      BACKEND_INTERNAL_URL: http://backend:${BACKEND_PORT:-8000}
      BACKEND_API_KEY: ${API_KEY}
      PORT: ${FRONTEND_PORT:-3000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./logs/frontend:/logs
    healthcheck:
      test: ["CMD-SHELL", "node -e \"http = require('http'); req = http.get({host: '127.0.0.1', port: process.env.PORT || 3000, path: '/'}, res => res.statusCode < 500 ? process.exit(0) : process.exit(1)); req.on('error', () => process.exit(1));\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - jacksparrow-network

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  qdrant-data:
    driver: local

networks:
  jacksparrow-network:
    driver: bridge
