services:
  postgres:
    image: timescale/timescaledb:2.25.1-pg15
    container_name: jacksparrow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jacksparrow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jacksparrow}
      POSTGRES_DB: ${POSTGRES_DB:-trading_agent}
    # For local development we expose Postgres to the host. In hardened
    # production you may remove this mapping and access it only via Docker network.
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jacksparrow} -d ${POSTGRES_DB:-trading_agent}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - jacksparrow-network

  redis:
    image: redis:7.2-alpine
    container_name: jacksparrow-redis
    command: ["redis-server", "--appendonly", "yes"]
    # For local development we expose Redis to the host. In hardened
    # production you may remove this mapping and access it only via Docker network.
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - jacksparrow-network

  agent:
    container_name: jacksparrow-agent
    build:
      context: .
      dockerfile: agent/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-jacksparrow}:${POSTGRES_PASSWORD:-jacksparrow}@postgres:5432/${POSTGRES_DB:-trading_agent}
      REDIS_URL: redis://redis:6379/0
      DELTA_EXCHANGE_API_KEY: ${DELTA_EXCHANGE_API_KEY:-changeme}
      DELTA_EXCHANGE_API_SECRET: ${DELTA_EXCHANGE_API_SECRET:-changeme}
      DELTA_EXCHANGE_BASE_URL: ${DELTA_EXCHANGE_BASE_URL:-https://api.india.delta.exchange}
      # Discover BTCUSD v5 models by default
      MODEL_DIR: /app/agent/model_storage/jacksparrow_v5_BTCUSD_2026-03-19
      MODEL_PATH: ${MODEL_PATH:-}
      AGENT_START_MODE: ${AGENT_START_MODE:-MONITORING}
      AGENT_SYMBOL: ${AGENT_SYMBOL:-BTCUSD}
      AGENT_INTERVAL: ${AGENT_INTERVAL:-15m}
      AGENT_WS_PORT: ${AGENT_WS_PORT:-8003}
      FEATURE_SERVER_PORT: 8002
      LOG_LEVEL: ${AGENT_LOG_LEVEL:-INFO}
      LOGS_ROOT: /logs
      BACKEND_WS_URL: ws://backend:8000/ws/agent
    volumes:
      - ./agent/model_storage:/app/agent/model_storage
      - ./logs/agent:/logs
      - ./logs/paper_trades:/logs/paper_trades
    ports:
      - "${FEATURE_SERVER_PORT:-8002}:8002"
      - "${AGENT_WS_PORT:-8003}:8003"
    healthcheck:
      test: ["CMD", "python", "-m", "agent.healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '2'
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - jacksparrow-network

  backend:
    container_name: jacksparrow-backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      agent:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      BACKEND_RELOAD: "false"
      DATABASE_URL: postgresql://${POSTGRES_USER:-jacksparrow}:${POSTGRES_PASSWORD:-jacksparrow}@postgres:5432/${POSTGRES_DB:-trading_agent}
      REDIS_URL: redis://redis:6379/0
      FEATURE_SERVER_URL: http://agent:8002
      AGENT_WS_URL: ws://agent:${AGENT_WS_PORT:-8003}
      USE_AGENT_WEBSOCKET: ${USE_AGENT_WEBSOCKET:-true}
      DELTA_EXCHANGE_API_KEY: ${DELTA_EXCHANGE_API_KEY:-changeme}
      DELTA_EXCHANGE_API_SECRET: ${DELTA_EXCHANGE_API_SECRET:-changeme}
      DELTA_EXCHANGE_BASE_URL: ${DELTA_EXCHANGE_BASE_URL:-https://api.india.delta.exchange}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-jwt-secret}
      API_KEY: ${API_KEY:-dev-api-key}
      BACKEND_PORT: ${BACKEND_PORT:-8000}
      BACKEND_HOST: 0.0.0.0
      LOG_LEVEL: ${BACKEND_LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000,http://127.0.0.1:3001},http://frontend:3000
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./logs/backend:/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${BACKEND_PORT:-8000}/api/v1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - jacksparrow-network

  frontend:
    container_name: jacksparrow-frontend
    build:
      context: frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000/ws}
        NEXT_PUBLIC_BACKEND_API_KEY: ${API_KEY:-dev-api-key}
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000/ws}
      NEXT_PUBLIC_BACKEND_API_KEY: ${API_KEY:-dev-api-key}
      PORT: ${FRONTEND_PORT:-3000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./logs/frontend:/logs
    healthcheck:
      test: ["CMD-SHELL", "node -e \"http = require('http'); req = http.get({host: '127.0.0.1', port: process.env.PORT || 3000, path: '/'}, res => res.statusCode < 500 ? process.exit(0) : process.exit(1)); req.on('error', () => process.exit(1));\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - jacksparrow-network

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local

networks:
  jacksparrow-network:
    driver: bridge
