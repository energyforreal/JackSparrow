name: CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  validation:
    name: Validate configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx sqlalchemy psycopg2-binary

      - name: Validate environment variables (structure check)
        run: |
          python scripts/validate-env.py || echo "Environment validation completed (may fail without actual .env)"
        continue-on-error: true

      - name: Validate prerequisites (versions only)
        run: |
          python tools/commands/validate-prerequisites.py || echo "Prerequisites validation completed (services not available in CI)"
        continue-on-error: true

      - name: Validation summary
        run: |
          echo "Validation checks completed. Some checks may be skipped in CI environment."

  python-tests:
    name: Python tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs:
      - validation
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            path: backend
          - service: agent
            path: agent
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ${{ matrix.path }}/requirements.txt
          pip install ruff black mypy

      - name: Lint with ruff
        run: ruff check ${{ matrix.path }}
        continue-on-error: true

      - name: Format check with black
        run: black --check ${{ matrix.path }}
        continue-on-error: true

      - name: Type check with mypy
        run: mypy ${{ matrix.path }} --ignore-missing-imports
        continue-on-error: true

      - name: Run pytest
        run: pytest
        working-directory: ${{ matrix.path }}

  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    needs:
      - validation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint with ESLint
        run: npm run lint
        working-directory: frontend
        continue-on-error: true

      - name: Type check with TypeScript
        run: npm run type-check
        working-directory: frontend
        continue-on-error: true

      - name: Run tests
        run: npm test -- --ci
        working-directory: frontend

  functionality-tests:
    name: Functionality tests (including frontend)
    runs-on: ubuntu-latest
    needs:
      - python-tests
      - frontend-tests
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jacksparrow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r agent/requirements.txt
          pip install aiohttp websockets

      - name: Install Frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Set up environment variables
        run: |
          echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/jacksparrow_test" >> $GITHUB_ENV
          echo "REDIS_URL=redis://localhost:6379" >> $GITHUB_ENV
          echo "API_KEY=test-api-key" >> $GITHUB_ENV
          echo "FRONTEND_URL=http://localhost:3000" >> $GITHUB_ENV

      - name: Start services (backend, agent, frontend)
        run: |
          # Start services in background
          python tools/commands/start_parallel.py &
          sleep 30  # Wait for services to start
        continue-on-error: true

      - name: Run model-service integration tests
        run: |
          cd $GITHUB_WORKSPACE
          python -m pytest tests/integration/test_model_service_integration.py -v --tb=short
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/jacksparrow_test
          REDIS_URL: redis://localhost:6379
          DELTA_EXCHANGE_API_KEY: test-key
          DELTA_EXCHANGE_API_SECRET: test-secret

      - name: Run functionality tests
        run: |
          python tools/commands/start_and_test.py --no-startup --test-mode grouped
        continue-on-error: true

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: functionality-test-reports
          path: |
            tests/functionality/reports/*.json
            tests/functionality/reports/*.md
          retention-days: 7

  docker-images:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    needs:
      - python-tests
      - frontend-tests
      - functionality-tests
    strategy:
      matrix:
        include:
          - name: backend
            context: .
            file: backend/Dockerfile
          - name: agent
            context: .
            file: agent/Dockerfile
          - name: frontend
            context: frontend
            file: frontend/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/jacksparrow-${{ matrix.name }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/jacksparrow-${{ matrix.name }}:latest

  deploy:
    name: Deploy & restart containers
    runs-on: ubuntu-latest
    needs: docker-images
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Restart remote stack
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -euo pipefail
            export DEPLOY_PATH=${{ secrets.DEPLOY_PATH }}
            export COMPOSE_FILE=docker-compose.yml
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            cd "$DEPLOY_PATH"
            git fetch origin main
            git checkout main
            git pull origin main
            docker compose pull
            docker compose up -d --pull always --build

